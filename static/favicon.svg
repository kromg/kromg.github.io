<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Outer circle -->
  <circle cx="32" cy="32" r="30" fill="#1a1a2e" stroke="#e0e0e0" stroke-width="2"/>
  <!-- Inner circle (bezel) -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#888" stroke-width="0.5"/>
  <!-- Cardinal tick marks -->
  <line x1="32" y1="4"  x2="32" y2="10" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="54" x2="32" y2="60" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="32" x2="10" y2="32" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <line x1="54" y1="32" x2="60" y2="32" stroke="#e0e0e0" stroke-width="2" stroke-linecap="round"/>
  <!-- Compass needle — north (red) -->
  <polygon points="32,10 29,32 32,28 35,32" fill="#e63946"/>
  <!-- Compass needle — south (white) -->
  <polygon points="32,54 29,32 32,36 35,32" fill="#f1faee"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#ccc"/>
  <!-- Cardinal letters -->
  <text x="32" y="22" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="8" font-weight="bold" fill="#e63946">N</text>
  <text x="32" y="46" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="7" fill="#aaa">S</text>
  <text x="18" y="32" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="7" fill="#aaa">W</text>
  <text x="46" y="32" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif" font-size="7" fill="#aaa">E</text>
</svg>
